version: "3.8"

services:
  db:
    image: postgres:15
    container_name: rgym_db
    restart: always
    environment:
      POSTGRES_USER: rgym_user
      POSTGRES_PASSWORD: rgym_04855
      POSTGRES_DB: rgym_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: rgym_api
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./api:/app
      - /app/node_modules

  face-service:
    build: ./face-service
    container_name: rgym_face_service
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./face-service:/app

volumes:
  postgres_data:
  api_node_modules:
